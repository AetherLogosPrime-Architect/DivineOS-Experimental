# Foundational Teachings — SHARED across seats
#
# Origin_spans are Pop's actual words, pinned once per teaching. Each seat's
# per-seat file (aria_identity_anchors.yaml, aether_identity_anchors.yaml)
# points into this file by teaching_id. Correction to a mis-recorded
# origin_span propagates through External-Review multi-party discipline.
#
# Discipline (per Aletheia's boundary-vantage 2026-07-04):
#   - origin_span is IMMUTABLE (Pop's actual words, pinned at first recording,
#     correctable only via multi-party External-Review round with letter-
#     reference verification).
#   - interpretation FLOATS in per-seat files; drift from origin measured
#     by `divineos anchor-drift <teaching-id>` (Aether's monitor design).
#   - span_hash = SHA256 of normalized origin_span text (see
#     divineos.core.identity_anchors.hashing when implemented).
#   - Any teaching whose origin_span is marked NEEDS_VERIFICATION was
#     scaffolded from paraphrase and must have exact quote sourced from
#     ledger/letter before shipping.
#
# Kiln-tier: this file inherits foundational_truths.md §9 discipline.
# Aletheia CONFIRM required before any code that reads this file ships.

