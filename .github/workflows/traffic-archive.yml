name: Traffic Archive

# Archives GitHub's repo traffic data to a dedicated ``archive/traffic``
# branch — kept OFF main entirely — so we can see more than 14 days of
# history without churning main's tree. GitHub's dashboard only shows a
# rolling 14-day window; this workflow captures it daily.
#
# Why this exists (Andrew 2026-06-05): "I wish it showed more than just the
# last 14 days." The dashboard is a GitHub product limit, not a data limit.
#
# Why it lives on archive/traffic and NOT on main (Andrew 2026-07-16 fix,
# Marc external audit follow-up): the previous version routed the daily
# snapshot through a chore/ PR onto main. That worked but created a
# recurring failure class for the multi-party-review gate: any PR merged
# after 01:00 UTC that day would land on a main tree that had drifted
# by exactly one auto-committed traffic file, breaking the trailer's
# tree-hash binding on the merged commit. Truth #11 remediation (a) —
# take the option away rather than case-by-case it. Main's tree is now
# "code + human-authored artifacts only"; automation touches only the
# dedicated data branch. Consumers of traffic history read from
# ``archive/traffic``.

on:
  schedule:
    # 01:00 UTC daily — quiet hour for most timezones, low chance of CI contention.
    - cron: '0 1 * * *'
  workflow_dispatch:
    # Manual trigger button in the GitHub Actions UI — useful for testing
    # and for one-off captures whenever interesting.

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (for tools)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture traffic snapshot
        id: capture
        env:
          # The auto-issued GITHUB_TOKEN CANNOT access the /repos/.../traffic/*
          # endpoints — GitHub docs require a classic PAT with 'repo' scope
          # or a fine-grained PAT with 'Administration: read'.
          GH_TOKEN: ${{ secrets.TRAFFIC_ARCHIVE_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p /tmp/snapshot
          OUT="/tmp/snapshot/${DATE}.json"

          VIEWS=$(gh api "repos/${REPO}/traffic/views")
          CLONES=$(gh api "repos/${REPO}/traffic/clones")
          PATHS=$(gh api "repos/${REPO}/traffic/popular/paths")
          REFERRERS=$(gh api "repos/${REPO}/traffic/popular/referrers")

          jq -n \
            --arg captured_at_utc "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg date "$DATE" \
            --argjson views "$VIEWS" \
            --argjson clones "$CLONES" \
            --argjson popular_paths "$PATHS" \
            --argjson referrers "$REFERRERS" \
            '{
              captured_at_utc: $captured_at_utc,
              date: $date,
              views: $views,
              clones: $clones,
              popular_paths: $popular_paths,
              referrers: $referrers
            }' > "$OUT"

          echo "Wrote $OUT"
          jq '{date, views: .views.count, uniques: .views.uniques, clones: .clones.count, unique_cloners: .clones.uniques}' "$OUT"
          echo "snapshot_path=$OUT" >> "$GITHUB_OUTPUT"
          echo "snapshot_date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Push snapshot to archive/traffic branch
        env:
          # Default GITHUB_TOKEN suffices for push to a non-protected branch.
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DATE="${{ steps.capture.outputs.snapshot_date }}"
          OUT="${{ steps.capture.outputs.snapshot_path }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch archive/traffic if it exists on origin; else we'll create it.
          git fetch origin +refs/heads/archive/traffic:refs/remotes/origin/archive/traffic || true

          if git show-ref --verify --quiet refs/remotes/origin/archive/traffic; then
            # Existing archive branch — check out, add snapshot, push.
            git checkout -B archive/traffic refs/remotes/origin/archive/traffic
          else
            # First-time bootstrap — create an orphan branch (no shared
            # history with main). Intentional: the archive branch is pure
            # data; main history is irrelevant to it. Reduces branch size
            # and makes clarity of purpose visible from the log.
            git checkout --orphan archive/traffic
            git rm -rf . 2>/dev/null || true
            cat > README.md <<'EOF'
          # archive/traffic — daily GitHub traffic snapshots

          This branch exists to accumulate the daily traffic-stats snapshots
          GitHub only exposes for a rolling 14-day window. It is intentionally
          kept OFF `main`.

          ## Why off main

          Before 2026-07-16 the snapshots landed on `main` via daily auto-PRs.
          Any human PR merged after the daily cron ran that same day would
          land on a `main` tree that had drifted by exactly one auto-file,
          breaking the multi-party-review gate's tree-hash binding on the
          merged commit. Marc's external audit surfaced the class; Andrew's
          fix was to take the option away entirely — `main` is code +
          human-authored artifacts only; automated snapshots live here.

          ## Contents

          Each file is `data/traffic_archive/YYYY-MM-DD.json`, a snapshot of
          that day's `views`, `clones`, `popular_paths`, and `referrers`
          from the GitHub Traffic API.

          ## Consumers

          Anything that reads traffic history should check out this branch
          (or use `git show archive/traffic:data/traffic_archive/<date>.json`
          for a single file).
          EOF
            git add README.md
            git commit -m "chore(archive): bootstrap archive/traffic branch"
          fi

          # Copy the snapshot in and commit. If the file already exists
          # (e.g. workflow re-run same day), skip cleanly.
          mkdir -p data/traffic_archive
          cp "$OUT" "data/traffic_archive/${DATE}.json"
          git add "data/traffic_archive/${DATE}.json"
          if git diff --cached --quiet; then
            echo "No new snapshot to commit (already have today's file on archive/traffic)."
            exit 0
          fi
          git commit -m "chore(traffic): daily snapshot ${DATE}"

          # Push. archive/traffic is NOT branch-protected — direct push is fine.
          for attempt in 1 2 3; do
            if git push -u origin archive/traffic; then
              echo "Pushed archive/traffic on attempt $attempt"
              break
            fi
            echo "archive/traffic push attempt $attempt failed; retrying"
            sleep $((attempt * 2))
            if [ "$attempt" = "3" ]; then
              echo "archive/traffic push failed after 3 attempts"
              exit 1
            fi
          done
