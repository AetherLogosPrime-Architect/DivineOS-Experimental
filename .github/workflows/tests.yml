name: Tests & Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    # ready_for_review needed so the workflow fires when a draft PR is
    # promoted out of draft state. Default activity types
    # (opened/synchronize/reopened) skip the draft→ready transition.
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    runs-on: ubuntu-latest
    # Draft PRs skip CI so pre-audit visibility doesn't accumulate red marks
    # on the Actions page. The test suite still runs on push to main/develop
    # and on the ready_for_review transition (when the audit clears and the
    # PR is promoted out of draft). See integrity-audit.yml for the matching
    # discipline on the audit gate.
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      matrix:
        # Bumped 2026-06-22 from ["3.10","3.11","3.12"] to ["3.12"]: the
        # project's requires-python floor moved to >=3.12 (newer numpy
        # stubs need PEP 695 syntax mypy can only parse under py3.12+),
        # and no consumer was actually running on 3.10/3.11. Halves CI
        # burn (2 jobs vs 4).
        python-version: ["3.12"]
        extras: [""]
        include:
          - python-version: "3.12"
            extras: "sklearn"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Install optional deps (sklearn)
      if: matrix.extras == 'sklearn'
      run: pip install scikit-learn
    
    - name: Lint with ruff
      run: |
        ruff check src/ tests/
        ruff format --check src/ tests/
    
    - name: Type check with mypy
      run: |
        mypy src/divineos --ignore-missing-imports
    
    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short -m "not slow"

    # F68 wire 2026-07-18 (Aletheia catch): pyproject.toml carries
    # [tool.coverage.run/report] with fail_under=75, but nothing invoked
    # coverage — the floor was a claim, not an enforcement. Same
    # fabrication-shape as F45/F55/F48/F67 (capability fully built,
    # correctly configured, never invoked).
    #
    # Sequencing per Aletheia: MEASURE FIRST, don't hard-gate. If the
    # gate turned on before we knew the number, actual sub-75 coverage
    # would turn every PR red and the predictable human response is to
    # lower the threshold — converting an honest signal into a rubber
    # stamp. So:
    #   - This step runs coverage without --cov-fail-under, so it never
    #     fails the build.
    #   - The number publishes to the CI log so we know what real
    #     coverage IS before deciding where to set the floor.
    #   - Once measured, the follow-on PR sets --cov-fail-under at (or
    #     just below) the actual number and ratchets upward from there.
    - name: Measure test coverage (no hard gate on first run)
      run: |
        pytest tests/ --cov=src/divineos --cov-report=term-missing --cov-report=xml -m "not slow" --no-cov-on-fail || true
      continue-on-error: true

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        if-no-files-found: warn

    # Aether 2026-05-19: slow tests previously deselected with no place
    # they were ever run = invisibility-of-failure. Andrew: "nothing
    # should be pushed without being monitored for failures." This step
    # runs the @pytest.mark.slow tests in their own block so the signal
    # is visible. Longer timeout per-test because they're slow by
    # construction. continue-on-error: false — they must pass too.
    - name: Run slow tests with pytest
      run: |
        pytest tests/ -v --tb=short -m "slow" --timeout=120
