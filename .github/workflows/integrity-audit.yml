name: Integrity Audit

# Server-side enforcement of integrity invariants that the local pre-commit
# hook tries to enforce but can be bypassed with --no-verify. This workflow
# runs in GitHub Actions where the agent has no write access, so it's the
# off-host anchor for the self-audit stack.
#
# PHASE 1 scope (this file):
#   - Verify: any commit in a PR that modifies a guardrail file must carry
#     an "External-Review: <id>" trailer in its commit message. This is a
#     purely textual check — the trailer's PRESENCE is verified, not the
#     referenced audit round's validity.
#
# What Phase 1 does NOT yet enforce (Phase 2 architectural work):
#   - That the referenced audit round actually exists in the Watchmen store
#   - That the round has CONFIRMS findings from user + external AI actors
#   - That the round's diff-hash matches the current diff
#   - That the referenced pre-reg exists and is open
#
#   Phase 2 requires committed audit-round and pre-reg state (or an external
#   DB that CI can query). That's a bigger architectural shift — deferred.
#   Phase 1 still closes the --no-verify bypass on the trailer requirement,
#   which is the biggest single integrity gap.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  guardrail-trailer-check:
    name: multi-party-review
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify guardrail-modifying commits carry External-Review trailer
        shell: bash
        run: |
          set -e

          # Determine the commit range to check.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # Handle edge case: BASE_SHA may be all-zeros for initial push.
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            echo "No base commit available (initial push?). Skipping range check."
            exit 0
          fi

          # List commits authored DIRECTLY on this branch in the range,
          # using --first-parent. Commits absorbed via merge from an
          # upstream remote rode in on a merge commit; their review
          # happened upstream (or rides on the merge commit's own trailer
          # if the merge itself touches a guardrail file). Without
          # --first-parent the gate retroactively re-validates upstream
          # history every time a downstream branch merges, which is the
          # wrong responsibility-boundary — closed 2026-05-01.
          COMMITS=$(git rev-list --first-parent "$BASE_SHA..$HEAD_SHA" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No commits to check in range $BASE_SHA..$HEAD_SHA."
            exit 0
          fi

          # Point-in-time guardrail-list resolution (2026-05-12 fix).
          # Each commit is evaluated against the guardrail list AS IT
          # EXISTED at that commit, not against today's list. Otherwise
          # adding a file to the guardrail list retroactively invalidates
          # every prior commit that ever touched that file — which is
          # backward-incompatible and creates false positives like
          # fa4325eaa07: that commit touched
          # addressee_misdirection_detector.py BEFORE the file was added
          # to the guardrail list. Under today's-list-check it gets
          # flagged; under point-in-time-check it doesn't because the
          # file wasn't guardrailed when the commit landed.
          load_guardrail_list_at() {
            local commit="$1"
            # Show the file content as it was at $commit. If the file
            # didn't exist (early history), git show fails → empty list.
            git show "$commit:scripts/guardrail_files.txt" 2>/dev/null \
              | grep -v '^[[:space:]]*#' \
              | grep -v '^[[:space:]]*$' \
              || true
          }

          BLOCKED_COMMITS=""
          for commit in $COMMITS; do
            # Load guardrail list AS IT WAS at this commit. Use the
            # parent's view so a commit that itself adds a file to the
            # guardrail list isn't gated by its own addition (the addition
            # protects FUTURE commits, not the commit that adds it).
            PARENT=$(git rev-parse "$commit^" 2>/dev/null || echo "$commit")
            COMMIT_GUARDRAIL_LIST=$(load_guardrail_list_at "$PARENT")
            if [ -z "$COMMIT_GUARDRAIL_LIST" ]; then
              # Empty list at this commit's parent → nothing to guard
              continue
            fi

            # Files touched by THIS commit only
            FILES=$(git show --name-only --pretty=format: "$commit" 2>/dev/null || true)

            # Does this commit touch any file that was guardrailed AT THE
            # TIME of this commit?
            TOUCHES_GUARDRAIL=""
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              if echo "$COMMIT_GUARDRAIL_LIST" | grep -Fxq "$f"; then
                TOUCHES_GUARDRAIL="yes"
                break
              fi
            done <<< "$FILES"

            if [ -z "$TOUCHES_GUARDRAIL" ]; then
              continue
            fi

            # Does the commit message have an External-Review trailer?
            MSG=$(git log -1 --format=%B "$commit")
            if echo "$MSG" | grep -qiE '^External-Review:[[:space:]]*\S+'; then
              echo "[ok] $commit modifies guardrail file(s); trailer present."
            else
              BLOCKED_COMMITS="$BLOCKED_COMMITS $commit"
              echo "[BLOCKED] $commit modifies guardrail file(s); no External-Review trailer."
            fi
          done

          if [ -n "$BLOCKED_COMMITS" ]; then
            echo ""
            echo "=== Multi-Party-Review Gate (server-side, point-in-time) ==="
            echo "BLOCKED. Commits modifying guardrail files without External-Review trailer:"
            for c in $BLOCKED_COMMITS; do
              echo "  $c"
            done
            echo ""
            echo "Every commit that modifies a file in scripts/guardrail_files.txt"
            echo "AS IT WAS at that commit must carry an 'External-Review: <id>'"
            echo "trailer in its commit message. The referenced audit round should"
            echo "contain CONFIRMS findings from both actor=user and an external"
            echo "AI actor."
            echo ""
            echo "This server-side check uses point-in-time guardrail-list lookup:"
            echo "a file getting added to the guardrail list later does NOT make"
            echo "prior commits that touched it retroactively-invalid. Adding to"
            echo "the guardrail list protects future commits."
            exit 1
          fi

          echo ""
          echo "All guardrail-modifying commits in this range carry the External-Review trailer."

  mixed-pattern-merge-check:
    name: mixed-pattern-merge
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mixed-pattern-merge gate (claim ec844fcf)
        run: |
          set -e
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="HEAD~1"
            HEAD_SHA="HEAD"
          fi

          # Refuse PRs that contain BOTH file additions AND deletions in
          # the same src/divineos/core/<subsystem>/ directory. Catches the
          # PR-#230 shape where strip work bundles with template additions.
          # See scripts/check_mixed_pattern_merge.py for design rationale.
          python scripts/check_mixed_pattern_merge.py "$BASE_SHA" "$HEAD_SHA"

  operator-merge-review:
    # Operator-anchored merge-review gate (Aether 2026-05-30, prereg-54f0a2240eb8).
    # Stronger than the trailer-textual check above: requires the operator's
    # APPROVED GitHub review on the exact head SHA (the one identity the agent
    # cannot forge) PLUS a named, actually-logged audit round. PR-only — it
    # needs the PR number + reviews list, which a bare push to main lacks.
    #
    # Expensive-to-game, not impossible; always bypassable: this REPORTS a
    # verdict. Branch protection (operator-side) decides whether a failing
    # verdict blocks. Sanctioned escape: admin merge or the
    # DIVINEOS_MERGE_REVIEW_EMERGENCY_BYPASS env var (LOGGED/REPORTED/
    # ADDRESSED/FIXED via emergency_bypass). A gate with no bypass is a cage.
    name: operator-merge-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Run operator-anchored merge-review gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci_merge_review_check.py \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"
